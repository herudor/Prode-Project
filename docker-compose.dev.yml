services:
  mongo:
    image: mongo:7
    container_name: prode-mongo-dev
    restart: unless-stopped
    volumes:
      - mongo_dev_data:/data/db
    networks:
      - prode-dev-net

  backend:
    image: node:20-alpine
    container_name: prode-backend-dev
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/prode-futbol-dev
    env_file: ./backend/.env.dev
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    networks:
      - prode-dev-net

  frontend:
    image: node:20-alpine
    container_name: prode-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - prode-dev-net

volumes:
  mongo_dev_data:

networks:
  prode-dev-net:
    driver: bridge
