version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: prode-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - prode-net

  backend:
    build: ./backend
    container_name: prode-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/prode-futbol
    ports:
      - "5001:5000"
    depends_on:
      - mongo
    networks:
      - prode-net

  frontend:
    build: ./frontend
    container_name: prode-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - prode-net

volumes:
  mongo_data:

networks:
  prode-net:
    driver: bridge
